<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Expense Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .auth-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            color: #0a0a0a;
        }

        .auth-title { font-size: 18px; font-weight: 600; color: var(--text); }
        .auth-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 24px; }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 14px;
        }

        .auth-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text3);
        }

        .auth-input {
            padding: 10px 12px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--sans);
            width: 100%;
            transition: border-color 0.15s;
        }

        .auth-input:focus { outline: none; border-color: var(--accent); }
        .auth-input::placeholder { color: var(--text3); }

        .auth-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--sans);
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.15s;
        }

        .auth-btn:hover { background: var(--accent2); }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text3);
        }

        .auth-link a { color: var(--accent); text-decoration: none; }
        .auth-link a:hover { text-decoration: underline; }

        .auth-error {
            background: var(--danger-bg);
            border: 1px solid rgba(205,92,92,0.3);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--danger);
            margin-bottom: 16px;
        }

        .password-hint {
            font-size: 11px;
            color: var(--text3);
            margin-top: 3px;
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-icon">₹</div>
            <span class="auth-title">Expense Tracker</span>
        </div>

        <div class="auth-subtitle">Create your account</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="auth-error">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="auth-field">
                <label class="auth-label">Your name</label>
                <input type="text" name="name" class="auth-input" placeholder="Dhrit" required autofocus>
            </div>
            <div class="auth-field">
                <label class="auth-label">Email</label>
                <input type="email" name="email" class="auth-input" placeholder="you@email.com" required>
            </div>
            <div class="auth-field">
                <label class="auth-label">Password</label>
                <input type="password" name="password" class="auth-input" placeholder="••••••••" required>
                <span class="password-hint">Minimum 6 characters</span>
            </div>
            <button type="submit" class="auth-btn">Create account</button>
        </form>

        <div class="auth-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

<script>
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
