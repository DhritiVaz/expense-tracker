<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction — Expense Tracker</title>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        html, body { overflow: auto; height: auto; }
        .edit-page { max-width: 440px; margin: 40px auto; padding: 0 20px 60px; }
        .edit-back { display: inline-block; margin-bottom: 16px; font-size: 12px; color: var(--text3); text-decoration: none; }
        .edit-back:hover { color: var(--text2); }
    </style>
</head>
<body>
<div class="edit-page">
    <a href="/" class="edit-back">← Back to dashboard</a>
    <div class="report-card">
        <div class="report-card-header">Edit transaction</div>
        <form action="/edit/{{ expense.id }}" method="POST" class="exp-form">

            <div class="field-group">
                <div class="field-lbl">Type</div>
                <div style="display:flex;gap:14px;margin-top:4px;">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;">
                        <input type="radio" name="type" value="expense"
                               {% if expense.type == 'expense' %}checked{% endif %}
                               onchange="toggleType(this.value)">
                        <span style="color:var(--danger)">Expense</span>
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;">
                        <input type="radio" name="type" value="income"
                               {% if expense.type == 'income' %}checked{% endif %}
                               onchange="toggleType(this.value)">
                        <span style="color:var(--income)">Income</span>
                    </label>
                </div>
            </div>

            <div class="field-group">
                <label class="field-lbl">Name</label>
                <input type="text" name="name" value="{{ expense.name }}" class="field-input" required>
            </div>

            <div class="field-group">
                <label class="field-lbl">Amount (₹)</label>
                <input type="number" name="amount" value="{{ expense.amount }}" class="field-input" step="0.01" required>
            </div>

            <div id="expense-cats" class="field-group">
                <label class="field-lbl">Category</label>
                <select name="category" id="exp-cat-select" class="field-input">
                    {% for cat in ['Food', 'Transport', 'Shopping', 'Health', 'Other'] %}
                    <option {% if expense.type == 'expense' and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="income-cats" class="field-group">
                <label class="field-lbl">Category</label>
                <select name="category" id="inc-cat-select" class="field-input">
                    {% for cat in ['Salary', 'Freelance', 'Gift', 'Investment', 'Other'] %}
                    <option {% if expense.type == 'income' and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field-group">
                <label class="field-lbl">Date</label>
                <input type="date" name="date" value="{{ expense.date }}" class="field-input" required>
            </div>

            <div style="display:flex;gap:10px;margin-top:4px;">
                <button type="submit" class="add-btn" style="flex:1;">Save changes</button>
                <a href="/" style="flex:1;height:32px;display:inline-flex;align-items:center;justify-content:center;color:var(--text3);text-decoration:none;border:0.5px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:var(--sans);">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleType(type) {
    const expDiv = document.getElementById('expense-cats');
    const incDiv = document.getElementById('income-cats');
    const expSel = document.getElementById('exp-cat-select');
    const incSel = document.getElementById('inc-cat-select');
    if (type === 'income') {
        expDiv.style.display = 'none';
        incDiv.style.display = 'flex';
        expSel.removeAttribute('name');
        incSel.setAttribute('name', 'category');
    } else {
        expDiv.style.display = 'flex';
        incDiv.style.display = 'none';
        incSel.removeAttribute('name');
        expSel.setAttribute('name', 'category');
    }
}
toggleType(document.querySelector('input[name="type"]:checked').value);
</script>
</body>
</html>
